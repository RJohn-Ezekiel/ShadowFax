<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>ShadowFax Room</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Matrix background -->
<canvas id="matrixCanvas"></canvas>

<!-- neofetch output -->
<div id="neofetch"></div>

<div class="chatLayout">

    <!-- CHAT AREA -->
    <div class="chatMain">

        <div id="chatBox"></div>

        <!-- typing indicator -->
        <div id="typing"></div>

        <!-- message input -->
        <textarea id="msg" placeholder="Type a message"></textarea>

        <div class="controls">

            <button id="sendBtn">Send</button>

            <button onclick="clearChat()">Clear Chat</button>

            <select id="themeSelector">
                <option value="green">Green</option>
                <option value="blue">Blue</option>
                <option value="white">White</option>
            </select>

        </div>

    </div>

    <!-- USER SIDEBAR -->
    <div class="chatSidebar">

        <div class="sidebarTitle">ONLINE</div>

        <div id="userList"></div>

    </div>

</div>

<!-- scripts at bottom -->
<script type="module" src="js/matrix.js"></script>
<script type="module" src="js/room.js"></script>

</body>

</html>
